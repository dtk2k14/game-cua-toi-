name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@main

    - name: Install Python and Buildozer
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip python3-virtualenv git zip unzip openjdk-17-jdk signfile libc6-dev
        pip3 install --upgrade pip --break-system-packages
        pip3 install buildozer cython virtualenv --break-system-packages

    - name: Build with Buildozer
      run: |
        buildozer android debug
      env:
        ACCEPT_SDK_LICENSE: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@main
      with:
        name: game-apk
        path: bin/*.apk
        
